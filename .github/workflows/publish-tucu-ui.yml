name: Publish tucu-ui to npm

# Triggered by pushing a version tag created by `pnpm tucu-ui:publish:<bump>`
# (scripts/publish.mjs) — that script bumps the version, updates docs, builds,
# commits, and tags, but does not publish. This workflow does the actual
# `npm publish`, authenticating via npm Trusted Publishing (OIDC) — no
# stored token, no OTP. Requires a one-time setup on npmjs.com: package
# Settings → Trusted Publisher → GitHub Actions, with
# org=e-burgos, repo=tucu-ui, workflow filename=publish-tucu-ui.yml.
#
# After publishing, it also creates a GitHub Release — but only when the
# release is "significant": a major or minor version bump, or a patch that
# contains a conventional-commit breaking-change marker (`feat!:`, `fix!:`,
# etc. or a `BREAKING CHANGE:` footer). Plain patch releases with no breaking
# marker stay as tags only, no GitHub Release.
on:
  push:
    tags:
      - 'tucu-ui-v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # read for checkout, write for creating the GitHub Release
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed to diff against the previous tucu-ui-v* tag

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Trusted publishing needs npm CLI >= 11.5.1; pin explicitly rather
      # than relying on whatever setup-node's bundled version happens to be.
      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Build tucu-ui
        run: pnpm nx run tucu-ui:build
        env:
          NX_NO_CLOUD: 'true'

      - name: Verify the pushed tag matches the built package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#tucu-ui-v}"
          PKG_VERSION=$(node -p "require('./dist/ui/tucu-ui/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) does not match dist/ui/tucu-ui/package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag version $TAG_VERSION matches package version."

      - name: Verify build artifacts exist
        run: |
          cd dist/ui/tucu-ui
          for f in index.js index.mjs index.d.ts index.css package.json; do
            test -f "$f" || { echo "::error::Missing dist artifact: $f"; exit 1; }
          done
          echo "All required artifacts present."

      - name: Publish to npm
        run: npm publish --access public
        working-directory: dist/ui/tucu-ui

      - name: Check whether this release is significant (major/minor bump or breaking commit)
        id: significance
        run: |
          PREFIX="tucu-ui-v"
          CURRENT_TAG="$GITHUB_REF_NAME"
          CURRENT_VERSION="${CURRENT_TAG#$PREFIX}"
          PREV_TAG=$(git tag -l "${PREFIX}*" --sort=-version:refname | grep -vx "$CURRENT_TAG" | head -n1)

          SHOULD_RELEASE=false

          if [ -z "$PREV_TAG" ]; then
            SHOULD_RELEASE=true # no prior tag to compare against — first release of this prefix
          else
            PREV_VERSION="${PREV_TAG#$PREFIX}"
            if [ "$(echo "$CURRENT_VERSION" | cut -d. -f1)" != "$(echo "$PREV_VERSION" | cut -d. -f1)" ] || \
               [ "$(echo "$CURRENT_VERSION" | cut -d. -f2)" != "$(echo "$PREV_VERSION" | cut -d. -f2)" ]; then
              SHOULD_RELEASE=true # major or minor bump
            fi
          fi

          RANGE="${PREV_TAG:+$PREV_TAG..}$CURRENT_TAG"
          LOG=$(git log $RANGE --pretty=format:'%s%n%b' --no-merges)
          if echo "$LOG" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:|BREAKING[ -]CHANGE:'; then
            SHOULD_RELEASE=true # explicit breaking-change marker, even on a patch bump
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.significance.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "@e-burgos/tucu-ui $GITHUB_REF_NAME" \
            --generate-notes \
            --latest=false
